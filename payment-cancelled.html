<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Payment Cancelled</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #fff5f5;
    }
    .icon { font-size: 64px; }
    h2 { color: #D32F2F; }
    p { color: #555; }
    button {
      margin-top: 20px;
      padding: 12px 28px;
      background: #D32F2F;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">❌</div>
  <h2>Paiement annulé</h2>
  <p>Redirection vers l'application...</p>
  <button onclick="openApp()">Retour à l'app</button>

  <script>
    function openApp() {
      window.location.href = 'bellunic://payment-cancelled';
    }

    setTimeout(function() {
      window.location.href = 'bellunic://payment-cancelled';
    }, 1500);
  </script>
</body>
</html>
